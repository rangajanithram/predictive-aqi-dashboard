name: Hourly AQI Data Fetcher

# This trigger tells GitHub to run this automatically
on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 of every hour
  workflow_dispatch: # Allows you to click a "Run" button manually

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Run Data Fetcher Script
        env:
          # We will securely store these in GitHub later
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python data_fetcher.py